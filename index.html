<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GOD X MODS | Premium Virtual Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Premium Cyber Background with Gradient + Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0d0f1a, #03050b);
            z-index: 0;
        }

        /* Animated Grid Pattern */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 200, 100, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 200, 100, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Animated Glowing Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: orbFloat 15s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #ff6b35;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: #ffcd7e;
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
            animation-duration: 20s;
        }
        .orb-3 {
            width: 250px;
            height: 250px;
            background: #7b2cbf;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
            animation-duration: 18s;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            50% { transform: translate(30px, -30px) scale(1.1); opacity: 0.4; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.2; }
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            background: radial-gradient(circle, #ffcd7e, transparent);
            opacity: 0.5;
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 12s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-120px) scale(0); opacity: 0; }
        }

        /* Main Card Container */
        .terminal-card {
            max-width: 480px;
            width: 100%;
            background: rgba(19, 22, 31, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 24px 22px 32px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,130,0.2), 0 0 30px rgba(255,200,80,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 2;
            border: 1px solid rgba(255,210,100,0.25);
            animation: cardGlow 3s infinite alternate;
            position: relative;
        }
        @keyframes cardGlow {
            0% { box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,130,0.1), 0 0 15px rgba(255,200,80,0.1); }
            100% { box-shadow: 0 35px 60px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,215,130,0.3), 0 0 35px rgba(255,200,80,0.4); }
        }

        .terminal-card:hover {
            transform: translateY(-6px);
        }

        /* Header */
        .mods-badge {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
        }
        .godx {
            font-size: 12px;
            letter-spacing: 1.5px;
            color: #ffdfaa;
            font-weight: 600;
            text-shadow: 0 0 4px #ffb34740;
        }
        .premium-tag {
            background: linear-gradient(135deg, #f5b042, #ffd966);
            padding: 5px 14px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 800;
            color: #0e0f16;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            animation: tagPulse 1.8s infinite;
        }
        @keyframes tagPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background: linear-gradient(135deg, #ffcd7e, #ffe0a3);}
            100% { transform: scale(1); }
        }

        .main-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #ffdfa5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .sub {
            font-size: 13px;
            color: #c0c7e0;
            margin-bottom: 24px;
            border-left: 3px solid #ffcd6b;
            padding-left: 10px;
        }

        /* Credit Card Mockup with Shine */
        .card-mock {
            background: linear-gradient(135deg, rgba(27,31,46,0.85), rgba(15,17,25,0.95));
            border-radius: 36px;
            padding: 20px 24px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,215,130,0.3);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card-mock::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,210,100,0.15), transparent 70%);
            transform: rotate(25deg);
            animation: shineMove 8s infinite;
            pointer-events: none;
        }
        @keyframes shineMove {
            0% { transform: translateX(-30%) translateY(-20%) rotate(25deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateX(40%) translateY(30%) rotate(25deg); opacity: 0; }
        }

        .card-type {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .mastercard-logo {
            font-weight: 800;
            font-size: 22px;
            background: linear-gradient(135deg, #eb001b, #f79e1b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .price-chip {
            background: #1e2337;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            color: #ffe2a4;
        }
        .card-number {
            font-size: 26px;
            letter-spacing: 3px;
            font-weight: 700;
            font-family: monospace;
            margin: 20px 0 18px;
            color: #ffffff;
            text-shadow: 0 0 6px #ffcd7e40;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #b7c0e0;
        }
        .holder-name {
            font-weight: 600;
            color: #dce3ff;
            text-transform: uppercase;
            margin-top: 12px;
        }
        .balance-row {
            margin-top: 18px;
            background: #00000040;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255,200,100,0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #c0c7e0;
        }
        .balance-amount {
            font-weight: 800;
            font-size: 18px;
            color: #ffdfa5;
            text-shadow: 0 0 6px #ffb347;
        }

        /* Cards Selector */
        .cards-selector {
            display: flex;
            gap: 16px;
            margin: 24px 0 20px;
        }
        .card-option {
            flex: 1;
            background: rgba(20, 24, 36, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 14px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,215,120,0.2);
        }
        .card-option.active {
            background: linear-gradient(125deg, #2a2f44, #1f253b);
            border: 1px solid #ffcd6b;
            box-shadow: 0 8px 20px -6px #ffcd6b60, 0 0 15px rgba(255,205,100,0.3);
            transform: scale(1.02);
        }
        .card-option .price {
            font-size: 26px;
            font-weight: 800;
            color: #ffdfa5;
        }
        .card-option .type-text {
            font-size: 12px;
            color: #8d96b5;
        }

        /* Buy Button with Shine */
        .buy-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5b042, #ffcd7e);
            border: none;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 800;
            border-radius: 60px;
            color: #0e0f16;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 8px 18px -4px #ffb347;
            position: relative;
            overflow: hidden;
        }
        .buy-btn:active {
            transform: scale(0.96);
        }
        .buy-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: btnShine 3s infinite;
        }
        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        .upi-note {
            text-align: center;
            font-size: 11px;
            color: #b7c0e0;
            margin-top: 22px;
        }

        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2337ee;
            backdrop-filter: blur(12px);
            color: #ffdfa5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            display: none;
            box-shadow: 0 8px 20px black;
            border: 1px solid #ffcd7e60;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .terminal-card { padding: 18px 16px 24px; }
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .toast-msg { font-size: 12px; white-space: normal; text-align: center; width: 80%; }
        }
    </style>
</head>
<body>

<!-- Animated Background Elements -->
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="terminal-card">
    <div class="mods-badge">
        <span class="godx">GOD X MODS PREMIUM</span>
        <span class="premium-tag">✦ PREMIUM VT ✦</span>
    </div>
    <div class="main-title">VIRTUAL TERMINAL</div>
    <div class="sub">secure • instant • premium</div>

    <!-- Credit Card Display -->
    <div class="card-mock">
        <div class="card-type">
            <span class="mastercard-logo">💳 MASTER CARD</span>
            <span class="price-chip" id="displayPrice">₱150</span>
        </div>
        <div class="card-number">5412 7582 9314 XXXX</div>
        <div class="card-details">
            <span>EXPIRES <strong>XX/XXXX</strong></span>
            <span>CVV <strong>•••</strong></span>
        </div>
        <div class="balance-row">
            <span class="balance-label">BALANCE / LIMIT</span>
            <span class="balance-amount" id="displayBalance">₱5,000</span>
        </div>
        <div class="holder-name">ROHIT SHARMA</div>
    </div>

    <!-- Amount Selector -->
    <div class="cards-selector">
        <div class="card-option active" data-amount="150" data-balance="5000">
            <div class="price">₱150</div>
            <div class="type-text">MASTER CARD</div>
        </div>
        <div class="card-option" data-amount="200" data-balance="4800">
            <div class="price">₱200</div>
            <div class="type-text">MASTER CARD</div>
        </div>
    </div>

    <!-- Buy Button -->
    <button class="buy-btn" id="buyCardBtn">💎 Buy Card • ₱150</button>
    <div class="upi-note">⚡ Click Buy → Auto open GPay / PhonePe / PayTM</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // CONFIGURATION - Your UPI ID
    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "GODXMODS";
    const CURRENCY = "INR";

    let currentAmount = 150;
    let currentBalance = 5000;

    // DOM Elements
    const option150 = document.querySelector('.card-option[data-amount="150"]');
    const option200 = document.querySelector('.card-option[data-amount="200"]');
    const buyBtn = document.getElementById('buyCardBtn');
    const displayPriceSpan = document.getElementById('displayPrice');
    const displayBalanceSpan = document.getElementById('displayBalance');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(message, duration = 2000) {
        toastMsg.textContent = message;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    function setSelectedAmount(amount, balance) {
        currentAmount = amount;
        currentBalance = balance;
        displayPriceSpan.innerText = `₱${amount}`;
        displayBalanceSpan.innerText = `₱${balance}`;
        buyBtn.innerHTML = `💎 Buy Card • ₱${amount}`;

        if (amount === 150) {
            option150.classList.add('active');
            option200.classList.remove('active');
        } else {
            option200.classList.add('active');
            option150.classList.remove('active');
        }
    }

    // Direct UPI Intent - Opens GPay/PhonePe/PayTM automatically
    function openUpiApp(amount) {
        const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=${CURRENCY}&tn=Premium%20Virtual%20Card%20₱${amount}`;
        
        // Create temporary anchor to trigger UPI app
        const tempAnchor = document.createElement('a');
        tempAnchor.href = upiUrl;
        tempAnchor.style.display = 'none';
        document.body.appendChild(tempAnchor);
        tempAnchor.click();
        document.body.removeChild(tempAnchor);
        
        // Show confirmation toast
        setTimeout(() => {
            showToast(`✅ Payment request sent for ₱${amount}. Open UPI app to complete.`, 4000);
        }, 500);
    }

    function handleBuy() {
        showToast(`✨ Opening UPI app for ₱${currentAmount}...`, 1500);
        openUpiApp(currentAmount);
    }

    // Event Listeners
    option150.addEventListener('click', () => setSelectedAmount(150, 5000));
    option200.addEventListener('click', () => setSelectedAmount(200, 4800));
    buyBtn.addEventListener('click', handleBuy);

    // Initialize
    setSelectedAmount(150, 5000);

    // Create floating particles for premium animation
    for (let i = 0; i < 35; i++) {
        let particle = document.createElement('div');
        particle.classList.add('particle');
        let size = Math.random() * 8 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = Math.random() * 12 + 8 + 's';
        document.body.appendChild(particle);
    }
</script>
</body>
</html>
