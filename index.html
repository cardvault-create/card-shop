<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CardVault | Premium Card Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* ========== PEHLE WALA ADVENTURE BACKGROUND ========== */
        .adventure-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 0;
        }

        .mountain {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(180deg, transparent, #1a1a3e);
            clip-path: polygon(0% 100%, 0% 60%, 10% 40%, 20% 55%, 30% 35%, 45% 50%, 60% 30%, 75% 45%, 85% 25%, 100% 40%, 100% 100%);
            animation: mountainFloat 8s ease-in-out infinite;
            z-index: 0;
        }
        .mountain-2 {
            height: 35%;
            background: linear-gradient(180deg, transparent, #2a2555);
            clip-path: polygon(0% 100%, 0% 70%, 15% 55%, 25% 65%, 40% 45%, 55% 60%, 70% 40%, 85% 55%, 100% 45%, 100% 100%);
            animation: mountainFloat 10s ease-in-out infinite reverse;
            opacity: 0.7;
        }
        @keyframes mountainFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
        }

        .sun-glow {
            position: fixed;
            top: 10%;
            right: 5%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ff9a56, #ff6b35, transparent);
            border-radius: 50%;
            filter: blur(40px);
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.08), 
                rgba(255, 0, 255, 0.08), 
                rgba(255, 100, 0, 0.08), 
                transparent);
            animation: auroraMove 12s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes auroraMove {
            0%, 100% { transform: translateX(-30%) skewX(10deg); opacity: 0.3; }
            50% { transform: translateX(30%) skewX(-10deg); opacity: 0.6; }
        }

        /* ========== MOON ========== */
        .moon-container {
            position: fixed;
            top: 5%;
            right: 5%;
            z-index: 2;
            animation: moonContainerFloat 6s ease-in-out infinite;
        }
        @keyframes moonContainerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .premium-moon {
            position: relative;
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 35% 35%, #fff8e7, #ffe6b3, #ffd89a);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 235, 170, 0.8), inset -8px -5px 15px rgba(0, 0, 0, 0.2);
            animation: moonPulse 3s ease-in-out infinite;
        }
        @keyframes moonPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .crater {
            position: absolute;
            background: radial-gradient(circle, rgba(180, 130, 70, 0.4), rgba(140, 100, 50, 0.2));
            border-radius: 50%;
        }
        .crater1 { width: 10px; height: 10px; top: 15%; left: 12%; }
        .crater2 { width: 7px; height: 7px; top: 45%; left: 25%; }
        .crater3 { width: 12px; height: 12px; bottom: 20%; right: 15%; }
        .crater4 { width: 6px; height: 6px; top: 60%; right: 35%; }
        .crater5 { width: 8px; height: 8px; top: 25%; right: 25%; }

        .moon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 230, 150, 0.3);
            transform: translate(-50%, -50%);
            animation: ringPulse 3s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        /* ========== STARS ========== */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* ========== PARTICLES ========== */
        .particle {
            position: fixed;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 6s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-150px) scale(0); opacity: 0; }
        }

        /* ========== MAIN CARD ========== */
        .container {
            max-width: 450px;
            width: 100%;
            z-index: 10;
        }

        .card-container {
            background: linear-gradient(135deg, rgba(20, 15, 45, 0.9), rgba(10, 8, 25, 0.95));
            border-radius: 32px;
            padding: 22px 24px 26px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
            animation: fadeIn 0.4s ease;
            backdrop-filter: blur(10px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .card-type {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .card-price {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            color: #0a0a1a;
            animation: pricePulse 1s infinite;
        }
        @keyframes pricePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .card-number {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 600;
            font-family: monospace;
            margin: 20px 0 18px;
            color: #ffffff;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #a8b2d1;
            margin-bottom: 18px;
        }
        .card-balance {
            font-weight: 800;
            font-size: 18px;
            color: #ffd700;
            margin: 10px 0;
        }
        .card-name {
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 12px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .add-cart {
            flex: 1;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #ffdfaa;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .buy-now {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            color: #0a0a1a;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .add-cart:active, .buy-now:active {
            transform: scale(0.96);
        }

        /* Next Button Only */
        .next-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .next-btn {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 100, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #ffd700;
            cursor: pointer;
            transition: 0.2s;
        }
        .next-btn:active {
            transform: scale(0.95);
        }
        .page-indicator {
            text-align: center;
            font-size: 12px;
            color: #8a94b5;
            margin-top: 12px;
        }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a19;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        @media (max-width: 500px) {
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .card-type { font-size: 16px; }
            .card-price { font-size: 15px; }
            .toast-msg { font-size: 11px; white-space: normal; width: 85%; text-align: center; }
        }
    </style>
</head>
<body>

<!-- ========== PEHLE WALE BACKGROUND ELEMENTS ========== -->
<div class="adventure-bg"></div>
<div class="mountain"></div>
<div class="mountain mountain-2"></div>
<div class="sun-glow"></div>
<div class="aurora"></div>

<!-- Moon -->
<div class="moon-container">
    <div class="moon-ring"></div>
    <div class="premium-moon">
        <div class="crater crater1"></div>
        <div class="crater crater2"></div>
        <div class="crater crater3"></div>
        <div class="crater crater4"></div>
        <div class="crater crater5"></div>
    </div>
</div>

<!-- Background Stars -->
<script>
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(star);
    }
    
    // Particles
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 4 + 1;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.bottom = '0%';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.animationDuration = Math.random() * 6 + 4 + 's';
        document.body.appendChild(particle);
    }
</script>

<!-- Main Container -->
<div class="container">
    <!-- Card Display -->
    <div id="cardContainer" class="card-container">
        <!-- Dynamic card will appear here -->
    </div>

    <!-- Next Button Only -->
    <div class="next-btn-container">
        <button class="next-btn" id="nextBtn">▶ NEXT CARD</button>
    </div>
    <div class="page-indicator" id="pageIndicator">Card 1 / 5</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // Cards Data - 5 Cards
    const cards = [
        {
            id: 1,
            type: "MASTERCARD",
            number: "5412 7582 9314 XXXX",
            expiry: "XX/XXXX",
            cvv: "•••",
            balance: 1200,
            price: 100,
            name: "ROHIT SHARMA"
        },
        {
            id: 2,
            type: "PLAY STORE",
            number: "5034 2430 5309 XXXX",
            expiry: "11/27",
            cvv: "•••",
            balance: 2450,
            price: 250,
            name: "JOHNSON CARDER"
        },
        {
            id: 3,
            type: "VISA",
            number: "4532 7890 1234 XXXX",
            expiry: "09/28",
            cvv: "•••",
            balance: 5000,
            price: 500,
            name: "SNEHA P."
        },
        {
            id: 4,
            type: "AMEX",
            number: "3602 7135 8913 XXXX",
            expiry: "01/30",
            cvv: "•••",
            balance: 10000,
            price: 1000,
            name: "DIVYA R."
        },
        {
            id: 5,
            type: "MASTERCARD",
            number: "5123 4567 8901 XXXX",
            expiry: "03/29",
            cvv: "•••",
            balance: 20000,
            price: 1500,
            name: "KARTIK R."
        }
    ];

    let currentIndex = 0;

    // DOM Elements
    const cardContainer = document.getElementById('cardContainer');
    const nextBtn = document.getElementById('nextBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const toastMsg = document.getElementById('toastMsg');

    // Render Current Card
    function renderCard() {
        const card = cards[currentIndex];
        const isPlayStore = card.type === "PLAY STORE";
        
        cardContainer.innerHTML = `
            <div class="card-header">
                <div class="card-type">${isPlayStore ? '🎮 PLAY STORE' : '💳 ' + card.type}</div>
                <div class="card-price">₹${card.price}</div>
            </div>
            <div class="card-number">${card.number}</div>
            <div class="card-details">
                <span>EXPIRES <strong>${card.expiry}</strong></span>
                <span>CVV <strong>${card.cvv}</strong></span>
            </div>
            <div class="card-balance">BALANCE / LIMIT: ₹${card.balance.toLocaleString()}</div>
            <div class="card-name">${card.name}</div>
            <div class="action-buttons">
                <div class="add-cart" onclick="addToCart(${card.id})">🛒 Add to Cart</div>
                <div class="buy-now" onclick="buyNow(${card.id})">💎 Buy Now — ₹${card.price}</div>
            </div>
        `;
        
        pageIndicator.textContent = `Card ${currentIndex + 1} / ${cards.length}`;
        
        // Update next button text on last card
        if (currentIndex === cards.length - 1) {
            nextBtn.innerHTML = '🏁 LAST CARD';
        } else {
            nextBtn.innerHTML = '▶ NEXT CARD';
        }
    }

    // Next Card Function
    function nextCard() {
        if (currentIndex + 1 < cards.length) {
            currentIndex++;
            renderCard();
        } else {
            showToast("🎉 This is the last card! No more cards available.");
        }
    }

    // Add to Cart
    function addToCart(cardId) {
        const card = cards.find(c => c.id === cardId);
        showToast(`📦 Added to cart: ${card.type} - ₹${card.price}`);
    }
    
    // Buy Now - UPI Payment
    function buyNow(cardId) {
        const card = cards.find(c => c.id === cardId);
        showToast(`💎 Processing payment for ₹${card.price}... Opening UPI app`);
        
        const upiUrl = `upi://pay?pa=kartikrawat6266@okhdfcbank&pn=CARDVAULT&am=${card.price}&cu=INR&tn=Premium%20Card%20Purchase`;
        const anchor = document.createElement('a');
        anchor.href = upiUrl;
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        
        setTimeout(() => {
            showToast(`💰 Payment request for ₹${card.price}. Open UPI app to complete!`, 4000);
        }, 1000);
    }

    function showToast(msg, duration = 2500) {
        toastMsg.textContent = msg;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    // Event Listeners
    nextBtn.addEventListener('click', nextCard);

    // Initialize
    renderCard();
</script>
</body>
</html>
