<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GOD X MODS | Premium Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: #05070a;
        }

        /* ========== ULTRA PREMIUM DYNAMIC BACKGROUND ========== */
        /* Base gradient - deep charcoal to midnight black */
        .bg-premium {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0f1219, #030507);
            z-index: 0;
        }

        /* Flowing light waves */
        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 200, 100, 0.08), 
                rgba(255, 160, 80, 0.05), 
                transparent);
            filter: blur(60px);
            animation: waveFlow 12s ease-in-out infinite;
            z-index: 0;
        }
        .wave-2 {
            bottom: 10%;
            height: 30%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(200, 100, 255, 0.05), 
                rgba(150, 80, 200, 0.03), 
                transparent);
            animation: waveFlow 15s ease-in-out infinite reverse;
        }
        @keyframes waveFlow {
            0%, 100% { transform: translateX(-10%) scaleX(1); opacity: 0.4; }
            50% { transform: translateX(10%) scaleX(1.2); opacity: 0.7; }
        }

        /* Premium diagonal lines overlay */
        .diagonal-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 40px,
                rgba(255, 215, 130, 0.02) 40px,
                rgba(255, 215, 130, 0.02) 80px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle grain texture */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjgiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* Soft radial glow behind card */
        .card-glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 200, 100, 0.12), transparent 70%);
            filter: blur(50px);
            z-index: 0;
            animation: pulseGlow 5s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Slow floating orbs - minimal & elegant */
        .orb-premium {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.15;
            animation: floatSlow 25s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes floatSlow {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }
        .orb-1 { width: 350px; height: 350px; background: #ff8c42; top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #9b59b6; bottom: -80px; right: -80px; animation-delay: 5s; }
        .orb-3 { width: 250px; height: 250px; background: #e67e22; top: 40%; left: 70%; animation-delay: 10s; }

        /* ========== MAIN CARD - ULTRA PREMIUM ========== */
        .terminal-card {
            max-width: 460px;
            width: 100%;
            background: rgba(12, 15, 22, 0.85);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 28px 26px 36px;
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 130, 0.12);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
            border: 1px solid rgba(255, 220, 150, 0.15);
        }

        .terminal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 45px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 130, 0.2);
        }

        /* Header */
        .mods-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .godx {
            font-size: 11px;
            letter-spacing: 2px;
            color: #a8b2d1;
            font-weight: 500;
            text-transform: uppercase;
        }
        .premium-tag {
            background: rgba(255, 215, 130, 0.12);
            backdrop-filter: blur(4px);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
            color: #ffdfaa;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 215, 130, 0.3);
        }

        .main-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #cdd6f4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            font-size: 13px;
            color: #8a94b5;
            margin-bottom: 28px;
            border-left: 2px solid #ffcd6b;
            padding-left: 12px;
            font-weight: 400;
        }

        /* Credit Card - Premium Dark Card */
        .card-mock {
            background: linear-gradient(135deg, #0f111a, #080a10);
            border-radius: 32px;
            padding: 22px 24px 26px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 215, 130, 0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card-mock::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,130,0.4), transparent);
        }

        .card-type {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }
        .mastercard-logo {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #e8b04c, #f5cd7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .price-chip {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            color: #ffdfa5;
            border: 1px solid rgba(255, 215, 130, 0.3);
        }
        .card-number {
            font-size: 24px;
            letter-spacing: 2.5px;
            font-weight: 600;
            font-family: 'SF Mono', 'Fira Code', monospace;
            margin: 22px 0 20px;
            color: #eef3ff;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #7a84a8;
            letter-spacing: 0.5px;
        }
        .holder-name {
            font-weight: 600;
            color: #c5ceec;
            text-transform: uppercase;
            margin-top: 16px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .balance-row {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255, 200, 100, 0.12);
        }
        .balance-label {
            font-size: 12px;
            color: #8a94b5;
        }
        .balance-amount {
            font-weight: 700;
            font-size: 17px;
            color: #ffdfa5;
        }

        /* Cards Selector - Clean & Premium */
        .cards-selector {
            display: flex;
            gap: 14px;
            margin: 28px 0 24px;
        }
        .card-option {
            flex: 1;
            background: rgba(18, 21, 30, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 215, 130, 0.15);
        }
        .card-option.active {
            background: linear-gradient(125deg, #1e243b, #161a2c);
            border: 1px solid #ffcd6b;
            box-shadow: 0 6px 16px -4px rgba(255, 205, 100, 0.2);
        }
        .card-option .price {
            font-size: 24px;
            font-weight: 700;
            color: #ffdfa5;
        }
        .card-option .type-text {
            font-size: 11px;
            color: #6a7396;
            margin-top: 4px;
        }

        /* Buy Button - Luxurious */
        .buy-btn {
            width: 100%;
            background: linear-gradient(95deg, #e8a844, #ffcd7e);
            border: none;
            padding: 18px 0;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            color: #0c0e16;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            box-shadow: 0 8px 20px -6px rgba(232, 168, 68, 0.3);
            letter-spacing: 0.5px;
        }
        .buy-btn:active {
            transform: scale(0.97);
        }

        .upi-note {
            text-align: center;
            font-size: 10px;
            color: #5a6388;
            margin-top: 24px;
            letter-spacing: 0.5px;
        }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 21, 30, 0.95);
            backdrop-filter: blur(12px);
            color: #ffdfa5;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            display: none;
            border: 1px solid rgba(255, 215, 130, 0.3);
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .terminal-card { padding: 20px 18px 28px; }
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .main-title { font-size: 26px; }
            .toast-msg { font-size: 11px; white-space: normal; width: 85%; text-align: center; }
        }
    </style>
</head>
<body>

<!-- Premium Background Elements -->
<div class="bg-premium"></div>
<div class="wave"></div>
<div class="wave wave-2"></div>
<div class="diagonal-lines"></div>
<div class="grain"></div>
<div class="card-glow-bg"></div>
<div class="orb-premium orb-1"></div>
<div class="orb-premium orb-2"></div>
<div class="orb-premium orb-3"></div>

<!-- Main Card -->
<div class="terminal-card">
    <div class="mods-badge">
        <span class="godx">GOD X MODS PREMIUM</span>
        <span class="premium-tag">PREMIUM VT</span>
    </div>
    <div class="main-title">VIRTUAL TERMINAL</div>
    <div class="sub">secure • instant • premium</div>

    <!-- Credit Card -->
    <div class="card-mock">
        <div class="card-type">
            <span class="mastercard-logo">MASTER CARD</span>
            <span class="price-chip" id="displayPrice">₱150</span>
        </div>
        <div class="card-number">5412 7582 9314 XXXX</div>
        <div class="card-details">
            <span>EXPIRES <strong>XX/XXXX</strong></span>
            <span>CVV <strong>•••</strong></span>
        </div>
        <div class="balance-row">
            <span class="balance-label">BALANCE / LIMIT</span>
            <span class="balance-amount" id="displayBalance">₱5,000</span>
        </div>
        <div class="holder-name">ROHIT SHARMA</div>
    </div>

    <!-- Amount Selector -->
    <div class="cards-selector">
        <div class="card-option active" data-amount="150" data-balance="5000">
            <div class="price">₱150</div>
            <div class="type-text">MASTER CARD</div>
        </div>
        <div class="card-option" data-amount="200" data-balance="4800">
            <div class="price">₱200</div>
            <div class="type-text">MASTER CARD</div>
        </div>
    </div>

    <!-- Buy Button -->
    <button class="buy-btn" id="buyCardBtn">Buy Card • ₱150</button>
    <div class="upi-note">Click Buy → Auto open GPay / PhonePe / PayTM</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // UPI Configuration
    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "GODXMODS";
    const CURRENCY = "INR";

    let currentAmount = 150;
    let currentBalance = 5000;

    const option150 = document.querySelector('.card-option[data-amount="150"]');
    const option200 = document.querySelector('.card-option[data-amount="200"]');
    const buyBtn = document.getElementById('buyCardBtn');
    const displayPriceSpan = document.getElementById('displayPrice');
    const displayBalanceSpan = document.getElementById('displayBalance');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(message, duration = 2500) {
        toastMsg.textContent = message;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    function setSelectedAmount(amount, balance) {
        currentAmount = amount;
        currentBalance = balance;
        displayPriceSpan.innerText = `₱${amount}`;
        displayBalanceSpan.innerText = `₱${balance}`;
        buyBtn.innerHTML = `Buy Card • ₱${amount}`;

        if (amount === 150) {
            option150.classList.add('active');
            option200.classList.remove('active');
        } else {
            option200.classList.add('active');
            option150.classList.remove('active');
        }
    }

    function openUpiApp(amount) {
        const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=${CURRENCY}&tn=Premium%20Virtual%20Card%20₱${amount}`;
        
        const anchor = document.createElement('a');
        anchor.href = upiUrl;
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        
        setTimeout(() => {
            showToast(`Payment request for ₱${amount}. Open UPI app to complete.`, 4000);
        }, 500);
    }

    function handleBuy() {
        showToast(`Opening UPI for ₱${currentAmount}...`, 1500);
        openUpiApp(currentAmount);
    }

    option150.addEventListener('click', () => setSelectedAmount(150, 5000));
    option200.addEventListener('click', () => setSelectedAmount(200, 4800));
    buyBtn.addEventListener('click', handleBuy);

    setSelectedAmount(150, 5000);
</script>
</body>
</html>
