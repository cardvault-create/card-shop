<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GOD X MODS | Direct UPI Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0c12 0%, #0f1119 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .terminal-card {
            max-width: 480px;
            width: 100%;
            background: #13161f;
            border-radius: 48px;
            padding: 24px 22px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .mods-badge {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
        }
        .godx {
            font-size: 12px;
            letter-spacing: 1.2px;
            color: #9aa1b5;
            font-weight: 500;
        }
        .premium-tag {
            background: linear-gradient(135deg, #f5b042, #ffd966);
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 800;
            color: #13161f;
        }

        .main-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #c0c7e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .sub {
            font-size: 13px;
            color: #6f7893;
            margin-bottom: 24px;
            border-left: 3px solid #ffcd6b;
            padding-left: 10px;
        }

        .card-mock {
            background: linear-gradient(125deg, #1b1f2e, #0f1119);
            border-radius: 32px;
            padding: 18px 22px 22px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-type {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .mastercard-logo {
            font-weight: 800;
            font-size: 22px;
            background: linear-gradient(135deg, #eb001b, #f79e1b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .price-chip {
            background: #1e2337;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            color: #ffe2a4;
        }
        .card-number {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 600;
            font-family: monospace;
            margin-bottom: 20px;
            color: #eef3ff;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #9fa8c9;
        }
        .holder-name {
            font-weight: 600;
            color: #dce3ff;
            text-transform: uppercase;
            margin-top: 12px;
        }
        .balance-row {
            margin-top: 18px;
            background: #00000030;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255,200,100,0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #b7c0e0;
        }
        .balance-amount {
            font-weight: 800;
            font-size: 18px;
            color: #f5cd7a;
        }

        .cards-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }
        .card-option {
            flex: 1;
            background: #1b1f2e;
            border-radius: 28px;
            padding: 14px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,215,120,0.2);
        }
        .card-option.active {
            background: linear-gradient(125deg, #2a2f44, #1f253b);
            border: 1px solid #ffcd6b;
            box-shadow: 0 8px 18px -6px #ffcd6b30;
        }
        .card-option .price {
            font-size: 26px;
            font-weight: 800;
            color: #ffdfa5;
        }
        .card-option .type-text {
            font-size: 12px;
            color: #8d96b5;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5b042, #ffcd7e);
            border: none;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 800;
            border-radius: 60px;
            color: #0e0f16;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 8px 18px -4px #ffb34770;
        }
        .buy-btn:active {
            transform: scale(0.97);
        }

        .upi-note {
            text-align: center;
            font-size: 11px;
            color: #4f5a7c;
            margin-top: 22px;
        }

        /* Toast message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2337;
            color: #ffdfa5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 12px black;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .terminal-card { padding: 20px 16px 26px; }
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .toast-msg { font-size: 12px; white-space: normal; text-align: center; width: 80%; }
        }
    </style>
</head>
<body>

<div class="terminal-card">
    <div class="mods-badge">
        <span class="godx">GOD X MODS PREMIUM</span>
        <span class="premium-tag">PREMIUM VT</span>
    </div>
    <div class="main-title">VIRTUAL TERMINAL</div>
    <div class="sub">instant • direct UPI</div>

    <div class="card-mock">
        <div class="card-type">
            <span class="mastercard-logo">MASTER CARD</span>
            <span class="price-chip" id="displayPrice">₱150</span>
        </div>
        <div class="card-number">5412 7582 9314 XXXX</div>
        <div class="card-details">
            <span>EXPIRES <strong>XX/XXXX</strong></span>
            <span>CVV <strong>***</strong></span>
        </div>
        <div class="balance-row">
            <span class="balance-label">BALANCE / LIMIT</span>
            <span class="balance-amount" id="displayBalance">₱5,000</span>
        </div>
        <div class="holder-name">ROHIT SHARMA</div>
    </div>

    <div class="cards-selector">
        <div class="card-option" data-amount="150" data-balance="5000">
            <div class="price">₱150</div>
            <div class="type-text">MASTER CARD</div>
        </div>
        <div class="card-option" data-amount="200" data-balance="4800">
            <div class="price">₱200</div>
            <div class="type-text">MASTER CARD</div>
        </div>
    </div>

    <button class="buy-btn" id="buyCardBtn">💳 Buy Card • ₱150</button>
    <div class="upi-note">⚡ Click Buy → Auto open Google Pay / PhonePe / PayTM</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // CONFIGURATION
    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "GODXMODS";
    const CURRENCY = "INR";

    let currentAmount = 150;
    let currentBalance = 5000;

    // DOM elements
    const option150 = document.querySelector('.card-option[data-amount="150"]');
    const option200 = document.querySelector('.card-option[data-amount="200"]');
    const buyBtn = document.getElementById('buyCardBtn');
    const displayPriceSpan = document.getElementById('displayPrice');
    const displayBalanceSpan = document.getElementById('displayBalance');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(message, duration = 2500) {
        toastMsg.textContent = message;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    // Update UI
    function setSelectedAmount(amount, balance) {
        currentAmount = amount;
        currentBalance = balance;
        displayPriceSpan.innerText = `₱${amount}`;
        displayBalanceSpan.innerText = `₱${balance}`;
        buyBtn.innerHTML = `💳 Buy Card • ₱${amount}`;

        if(amount === 150) {
            option150.classList.add('active');
            option200.classList.remove('active');
        } else {
            option200.classList.add('active');
            option150.classList.remove('active');
        }
    }

    // Generate UPI Intent URL (opens app directly)
    function getUPIIntentURL(amount) {
        // Standard upi:// intent link for PhonePe, GPay, PayTM
        const payeeName = MERCHANT_NAME;
        const note = `Payment for Virtual Card ₱${amount}`;
        const encodedName = encodeURIComponent(payeeName);
        const encodedNote = encodeURIComponent(note);
        
        // Most compatible UPI intent link
        return `upi://pay?pa=${UPI_ID}&pn=${encodedName}&am=${amount}&cu=${CURRENCY}&tn=${encodedNote}&mc=0000`;
    }

    // Try to open UPI app, fallback to QR code if fails
    function openUpiApp(amount) {
        const upiUrl = getUPIIntentURL(amount);
        
        // Create invisible iframe or try window.location
        // Most reliable: create a temporary link click
        const tempAnchor = document.createElement('a');
        tempAnchor.href = upiUrl;
        tempAnchor.style.display = 'none';
        document.body.appendChild(tempAnchor);
        tempAnchor.click();
        document.body.removeChild(tempAnchor);
        
        // Fallback: if app not opened within 2 seconds, show QR / alternative
        setTimeout(() => {
            showToast("⚠️ No UPI app found? Use QR code backup", 4000);
            // Show QR modal as backup
            showQRBackup(amount);
        }, 1800);
    }

    // Backup QR modal (if app not installed)
    function showQRBackup(amount) {
        // Create modal dynamically if needed
        let qrModal = document.getElementById('backupQrModal');
        if(!qrModal) {
            const modalDiv = document.createElement('div');
            modalDiv.id = 'backupQrModal';
            modalDiv.style.cssText = `
                position: fixed; top:0; left:0; width:100%; height:100%;
                background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
                display: flex; align-items: center; justify-content: center;
                z-index: 10000; visibility: hidden; opacity:0; transition:0.2s;
            `;
            modalDiv.innerHTML = `
                <div style="background: white; border-radius: 48px; padding: 28px; max-width: 340px; text-align: center;">
                    <div style="font-weight:800; font-size:24px;">📱 Scan & Pay</div>
                    <div id="backupQrAmount" style="font-size:28px; margin:12px 0; font-weight:800;"></div>
                    <div id="backupQrImg">Loading QR...</div>
                    <button id="closeBackupQr" style="margin-top:20px; background:#1e1f2c; color:white; padding:12px 24px; border:none; border-radius:40px; width:100%; font-weight:600;">Close</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            qrModal = modalDiv;
            
            document.getElementById('closeBackupQr').addEventListener('click', () => {
                qrModal.style.visibility = 'hidden';
                qrModal.style.opacity = '0';
            });
        }
        
        const upiLink = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=${CURRENCY}`;
        const qrUrl = `https://quickchart.io/qr?text=${encodeURIComponent(upiLink)}&size=260&margin=2`;
        
        document.getElementById('backupQrAmount').innerText = `₱${amount}`;
        const qrContainer = document.getElementById('backupQrImg');
        qrContainer.innerHTML = `<img src="${qrUrl}" style="width:100%; max-width:240px; border-radius:24px;" alt="UPI QR" />`;
        
        qrModal.style.visibility = 'visible';
        qrModal.style.opacity = '1';
    }

    // Handle buy click
    function handleBuy() {
        const amount = currentAmount;
        // First show toast confirming
        showToast(`🔄 Opening UPI app for ₱${amount}...`, 1500);
        // Directly open UPI intent
        openUpiApp(amount);
    }

    // Event listeners
    option150.addEventListener('click', () => setSelectedAmount(150, 5000));
    option200.addEventListener('click', () => setSelectedAmount(200, 4800));
    buyBtn.addEventListener('click', handleBuy);

    // Initialize
    setSelectedAmount(150, 5000);
</script>
</body>
</html>
