<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BeStChEat CarD AnD PlaY StoRe RedeeM CodE ShoP | Premium Virtual Carding Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: #0a0c1a;
        }

        /* ========== PREMIUM STARRY BACKGROUND ========== */
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0b0e1a 0%, #11172b 50%, #0a0c1a 100%);
            z-index: 0;
            overflow: hidden;
        }

        /* Moon */
        .moon {
            position: fixed;
            top: 8%;
            right: 5%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #fffbe6, #ffe6a3);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 230, 150, 0.6), 0 0 80px rgba(255, 220, 100, 0.3);
            z-index: 0;
            animation: moonGlow 4s infinite alternate;
        }
        @keyframes moonGlow {
            0% { box-shadow: 0 0 30px rgba(255, 230, 150, 0.4), 0 0 60px rgba(255, 220, 100, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 60px rgba(255, 230, 150, 0.8), 0 0 100px rgba(255, 220, 100, 0.5); transform: scale(1.02); }
        }

        /* Moon Craters */
        .moon::before {
            content: '';
            position: absolute;
            top: 25%;
            left: 20%;
            width: 20px;
            height: 20px;
            background: rgba(200, 170, 100, 0.3);
            border-radius: 50%;
        }
        .moon::after {
            content: '';
            position: absolute;
            bottom: 30%;
            right: 25%;
            width: 15px;
            height: 15px;
            background: rgba(200, 170, 100, 0.25);
            border-radius: 50%;
        }

        /* Stars Container */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Individual Star */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s infinite ease-in-out;
        }
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px rgba(255,255,200,0.8); }
        }

        /* Bigger Glowing Stars */
        .star-glow {
            position: absolute;
            background: radial-gradient(circle, #fffde6, #ffd580);
            border-radius: 50%;
            animation: starGlowPulse 2.5s infinite alternate;
        }
        @keyframes starGlowPulse {
            0% { opacity: 0.3; transform: scale(0.8); box-shadow: 0 0 5px #ffd580; }
            100% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px #ffd580, 0 0 25px #ffb347; }
        }

        /* Stars Niche Ghere (Lower area) */
        .star-cluster {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at center, rgba(255,215,130,0.08) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Shooting Stars */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: shootStar 8s linear infinite;
            opacity: 0;
            z-index: 0;
        }
        @keyframes shootStar {
            0% {
                transform: translateX(0) translateY(0) rotate(45deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            20% {
                transform: translateX(-200px) translateY(200px) rotate(45deg);
                opacity: 0;
            }
            100% {
                transform: translateX(-400px) translateY(400px) rotate(45deg);
                opacity: 0;
            }
        }

        /* Floating Particles (Dust) */
        .dust {
            position: fixed;
            background: radial-gradient(circle, #ffdfaa, transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: floatDust 15s infinite ease-in-out;
            z-index: 0;
            opacity: 0.4;
        }
        @keyframes floatDust {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-150px) translateX(30px) scale(0); opacity: 0; }
        }

        /* Main Card Container */
        .terminal-card {
            max-width: 480px;
            width: 100%;
            background: rgba(19, 22, 31, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 24px 22px 32px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,130,0.2), 0 0 30px rgba(255,200,80,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 2;
            border: 1px solid rgba(255,210,100,0.25);
            animation: cardGlow 3s infinite alternate;
            position: relative;
        }
        @keyframes cardGlow {
            0% { box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,130,0.1), 0 0 15px rgba(255,200,80,0.1); }
            100% { box-shadow: 0 35px 60px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,215,130,0.3), 0 0 35px rgba(255,200,80,0.4); }
        }

        .terminal-card:hover {
            transform: translateY(-6px);
        }

        /* Header */
        .mods-badge {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
        }
        .godx {
            font-size: 12px;
            letter-spacing: 1.5px;
            color: #ffdfaa;
            font-weight: 600;
            text-shadow: 0 0 4px #ffb34740;
        }
        .premium-tag {
            background: linear-gradient(135deg, #f5b042, #ffd966);
            padding: 5px 14px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 800;
            color: #0e0f16;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            animation: tagPulse 1.8s infinite;
        }
        @keyframes tagPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background: linear-gradient(135deg, #ffcd7e, #ffe0a3);}
            100% { transform: scale(1); }
        }

        .main-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #ffdfa5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .sub {
            font-size: 13px;
            color: #c0c7e0;
            margin-bottom: 24px;
            border-left: 3px solid #ffcd6b;
            padding-left: 10px;
        }

        /* Credit Card Mockup with Shine */
        .card-mock {
            background: linear-gradient(135deg, rgba(27,31,46,0.85), rgba(15,17,25,0.95));
            border-radius: 36px;
            padding: 20px 24px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,215,130,0.3);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card-mock::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,210,100,0.15), transparent 70%);
            transform: rotate(25deg);
            animation: shineMove 8s infinite;
            pointer-events: none;
        }
        @keyframes shineMove {
            0% { transform: translateX(-30%) translateY(-20%) rotate(25deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateX(40%) translateY(30%) rotate(25deg); opacity: 0; }
        }

        .card-type {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .mastercard-logo {
            font-weight: 800;
            font-size: 22px;
            background: linear-gradient(135deg, #eb001b, #f79e1b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .price-chip {
            background: #1e2337;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            color: #ffe2a4;
        }
        .card-number {
            font-size: 26px;
            letter-spacing: 3px;
            font-weight: 700;
            font-family: monospace;
            margin: 20px 0 18px;
            color: #ffffff;
            text-shadow: 0 0 6px #ffcd7e40;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #b7c0e0;
        }
        .holder-name {
            font-weight: 600;
            color: #dce3ff;
            text-transform: uppercase;
            margin-top: 12px;
        }
        .balance-row {
            margin-top: 18px;
            background: #00000040;
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(255,200,100,0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #c0c7e0;
        }
        .balance-amount {
            font-weight: 800;
            font-size: 18px;
            color: #ffdfa5;
            text-shadow: 0 0 6px #ffb347;
        }

        /* Cards Selector */
        .cards-selector {
            display: flex;
            gap: 16px;
            margin: 24px 0 20px;
        }
        .card-option {
            flex: 1;
            background: rgba(20, 24, 36, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 14px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,215,120,0.2);
        }
        .card-option.active {
            background: linear-gradient(125deg, #2a2f44, #1f253b);
            border: 1px solid #ffcd6b;
            box-shadow: 0 8px 20px -6px #ffcd6b60, 0 0 15px rgba(255,205,100,0.3);
            transform: scale(1.02);
        }
        .card-option .price {
            font-size: 26px;
            font-weight: 800;
            color: #ffdfa5;
        }
        .card-option .type-text {
            font-size: 12px;
            color: #8d96b5;
        }

        /* Buy Button with Shine */
        .buy-btn {
            width: 100%;
            background: linear-gradient(95deg, #f5b042, #ffcd7e);
            border: none;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 800;
            border-radius: 60px;
            color: #0e0f16;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 8px 18px -4px #ffb347;
            position: relative;
            overflow: hidden;
        }
        .buy-btn:active {
            transform: scale(0.96);
        }
        .buy-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: btnShine 3s infinite;
        }
        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        .upi-note {
            text-align: center;
            font-size: 11px;
            color: #b7c0e0;
            margin-top: 22px;
        }

        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2337ee;
            backdrop-filter: blur(12px);
            color: #ffdfa5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            display: none;
            box-shadow: 0 8px 20px black;
            border: 1px solid #ffcd7e60;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .terminal-card { padding: 18px 16px 24px; }
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .toast-msg { font-size: 12px; white-space: normal; text-align: center; width: 80%; }
            .moon { width: 60px; height: 60px; top: 5%; right: 3%; }
        }
    </style>
</head>
<body>

<!-- ========== STARRY BACKGROUND ========== -->
<div class="star-bg"></div>

<!-- Moon -->
<div class="moon"></div>

<!-- Stars Container -->
<div class="stars" id="starsContainer"></div>

<!-- Stars Niche Ghere (Lower Cluster) -->
<div class="star-cluster"></div>

<!-- Shooting Stars -->
<div class="shooting-star" style="top: 20%; left: 80%; animation-delay: 0s;"></div>
<div class="shooting-star" style="top: 60%; left: 70%; animation-delay: 4s;"></div>
<div class="shooting-star" style="top: 40%; left: 90%; animation-delay: 8s;"></div>
<div class="shooting-star" style="top: 75%; left: 50%; animation-delay: 12s;"></div>

<!-- Main Card -->
<div class="terminal-card">
    <div class="mods-badge">
        <span class="godx">GOD X MODS PREMIUM</span>
        <span class="premium-tag">✦ PREMIUM VT ✦</span>
    </div>
    <div class="main-title">VIRTUAL TERMINAL</div>
    <div class="sub">secure • instant • premium</div>

    <!-- Credit Card Display -->
    <div class="card-mock">
        <div class="card-type">
            <span class="mastercard-logo">💳 MASTER CARD</span>
            <span class="price-chip" id="displayPrice">₱150</span>
        </div>
        <div class="card-number">5412 7582 9314 XXXX</div>
        <div class="card-details">
            <span>EXPIRES <strong>XX/XXXX</strong></span>
            <span>CVV <strong>•••</strong></span>
        </div>
        <div class="balance-row">
            <span class="balance-label">BALANCE / LIMIT</span>
            <span class="balance-amount" id="displayBalance">₱5,000</span>
        </div>
        <div class="holder-name">ROHIT SHARMA</div>
    </div>

    <!-- Amount Selector -->
    <div class="cards-selector">
        <div class="card-option active" data-amount="150" data-balance="5000">
            <div class="price">₱150</div>
            <div class="type-text">MASTER CARD</div>
        </div>
        <div class="card-option" data-amount="200" data-balance="4800">
            <div class="price">₱200</div>
            <div class="type-text">MASTER CARD</div>
        </div>
    </div>

    <!-- Buy Button -->
    <button class="buy-btn" id="buyCardBtn">💎 Buy Card • ₱150</button>
    <div class="upi-note">⚡ Click Buy → Auto open GPay / PhonePe / PayTM</div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // ========== CREATE STARS ==========
    const starsContainer = document.getElementById('starsContainer');
    
    // Create normal stars (small twinkling)
    for (let i = 0; i < 180; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        starsContainer.appendChild(star);
    }
    
    // Create glowing stars (bigger)
    for (let i = 0; i < 40; i++) {
        const star = document.createElement('div');
        star.classList.add('star-glow');
        const size = Math.random() * 4 + 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        starsContainer.appendChild(star);
    }
    
    // Create stars niche ghere (bottom area cluster) - more dense
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        const size = Math.random() * 2.5 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = 60 + Math.random() * 40 + '%'; // bottom 40% area
        star.style.animationDelay = Math.random() * 4 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        starsContainer.appendChild(star);
    }
    
    // Create floating dust particles
    for (let i = 0; i < 50; i++) {
        const dust = document.createElement('div');
        dust.classList.add('dust');
        const size = Math.random() * 5 + 1;
        dust.style.width = size + 'px';
        dust.style.height = size + 'px';
        dust.style.left = Math.random() * 100 + '%';
        dust.style.bottom = Math.random() * 100 + '%';
        dust.style.animationDelay = Math.random() * 10 + 's';
        dust.style.animationDuration = Math.random() * 12 + 10 + 's';
        document.body.appendChild(dust);
    }

    // ========== UPI PAYMENT CODE ==========
    const UPI_ID = "kartikrawat6266@okhdfcbank";
    const MERCHANT_NAME = "GODXMODS";
    const CURRENCY = "INR";

    let currentAmount = 150;
    let currentBalance = 5000;

    const option150 = document.querySelector('.card-option[data-amount="150"]');
    const option200 = document.querySelector('.card-option[data-amount="200"]');
    const buyBtn = document.getElementById('buyCardBtn');
    const displayPriceSpan = document.getElementById('displayPrice');
    const displayBalanceSpan = document.getElementById('displayBalance');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(message, duration = 2000) {
        toastMsg.textContent = message;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    function setSelectedAmount(amount, balance) {
        currentAmount = amount;
        currentBalance = balance;
        displayPriceSpan.innerText = `₱${amount}`;
        displayBalanceSpan.innerText = `₱${balance}`;
        buyBtn.innerHTML = `💎 Buy Card • ₱${amount}`;

        if (amount === 150) {
            option150.classList.add('active');
            option200.classList.remove('active');
        } else {
            option200.classList.add('active');
            option150.classList.remove('active');
        }
    }

    function openUpiApp(amount) {
        const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amount}&cu=${CURRENCY}&tn=Premium%20Virtual%20Card%20₱${amount}`;
        
        const tempAnchor = document.createElement('a');
        tempAnchor.href = upiUrl;
        tempAnchor.style.display = 'none';
        document.body.appendChild(tempAnchor);
        tempAnchor.click();
        document.body.removeChild(tempAnchor);
        
        setTimeout(() => {
            showToast(`✅ Payment request sent for ₱${amount}. Open UPI app to complete.`, 4000);
        }, 500);
    }

    function handleBuy() {
        showToast(`✨ Opening UPI app for ₱${currentAmount}...`, 1500);
        openUpiApp(currentAmount);
    }

    option150.addEventListener('click', () => setSelectedAmount(150, 5000));
    option200.addEventListener('click', () => setSelectedAmount(200, 4800));
    buyBtn.addEventListener('click', handleBuy);

    setSelectedAmount(150, 5000);
</script>
</body>
</html>
