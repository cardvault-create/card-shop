<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CardVault | Premium Card Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* ========== PEHLE WALA ADVENTURE BACKGROUND ========== */
        .adventure-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 0;
        }

        .mountain {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(180deg, transparent, #1a1a3e);
            clip-path: polygon(0% 100%, 0% 60%, 10% 40%, 20% 55%, 30% 35%, 45% 50%, 60% 30%, 75% 45%, 85% 25%, 100% 40%, 100% 100%);
            animation: mountainFloat 8s ease-in-out infinite;
            z-index: 0;
        }
        .mountain-2 {
            height: 35%;
            background: linear-gradient(180deg, transparent, #2a2555);
            clip-path: polygon(0% 100%, 0% 70%, 15% 55%, 25% 65%, 40% 45%, 55% 60%, 70% 40%, 85% 55%, 100% 45%, 100% 100%);
            animation: mountainFloat 10s ease-in-out infinite reverse;
            opacity: 0.7;
        }
        @keyframes mountainFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
        }

        .sun-glow {
            position: fixed;
            top: 10%;
            right: 5%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #ff9a56, #ff6b35, transparent);
            border-radius: 50%;
            filter: blur(40px);
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.08), 
                rgba(255, 0, 255, 0.08), 
                rgba(255, 100, 0, 0.08), 
                transparent);
            animation: auroraMove 12s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes auroraMove {
            0%, 100% { transform: translateX(-30%) skewX(10deg); opacity: 0.3; }
            50% { transform: translateX(30%) skewX(-10deg); opacity: 0.6; }
        }

        /* ========== MOON ========== */
        .moon-container {
            position: fixed;
            top: 5%;
            right: 5%;
            z-index: 2;
            animation: moonContainerFloat 6s ease-in-out infinite;
        }
        @keyframes moonContainerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .premium-moon {
            position: relative;
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 35% 35%, #fff8e7, #ffe6b3, #ffd89a);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 235, 170, 0.8), inset -8px -5px 15px rgba(0, 0, 0, 0.2);
            animation: moonPulse 3s ease-in-out infinite;
        }
        @keyframes moonPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .crater {
            position: absolute;
            background: radial-gradient(circle, rgba(180, 130, 70, 0.4), rgba(140, 100, 50, 0.2));
            border-radius: 50%;
        }
        .crater1 { width: 10px; height: 10px; top: 15%; left: 12%; }
        .crater2 { width: 7px; height: 7px; top: 45%; left: 25%; }
        .crater3 { width: 12px; height: 12px; bottom: 20%; right: 15%; }
        .crater4 { width: 6px; height: 6px; top: 60%; right: 35%; }
        .crater5 { width: 8px; height: 8px; top: 25%; right: 25%; }

        .moon-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 230, 150, 0.3);
            transform: translate(-50%, -50%);
            animation: ringPulse 3s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        /* ========== STARS ========== */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* ========== PARTICLES ========== */
        .particle {
            position: fixed;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 6s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-150px) scale(0); opacity: 0; }
        }

        /* ========== MAIN CONTAINER ========== */
        .container {
            max-width: 450px;
            width: 100%;
            z-index: 10;
        }

        /* Category Buttons */
        .category-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .cat-btn {
            flex: 1;
            background: rgba(30, 25, 55, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 50px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 700;
            color: #ffdfaa;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .cat-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a1a;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .cat-btn:active {
            transform: scale(0.97);
        }

        /* Scrollable Cards Container */
        .cards-scroll-container {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            border-radius: 32px;
        }
        .cards-scroll-container::-webkit-scrollbar {
            display: none;
        }
        .cards-wrapper {
            display: flex;
            gap: 20px;
            padding: 5px 5px 15px 5px;
        }
        .card-item {
            min-width: 100%;
            scroll-snap-align: start;
        }

        /* Card Container */
        .card-container {
            background: linear-gradient(135deg, rgba(20, 15, 45, 0.9), rgba(10, 8, 25, 0.95));
            border-radius: 32px;
            padding: 22px 24px 26px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .card-container:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 215, 0, 0.6);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .card-type {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .card-price {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            color: #0a0a1a;
            animation: pricePulse 1s infinite;
        }
        @keyframes pricePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Master Card Styles */
        .card-number {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 600;
            font-family: monospace;
            margin: 20px 0 18px;
            color: #ffffff;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #a8b2d1;
            margin-bottom: 18px;
        }
        
        /* Play Store Redeem Code Styles */
        .redeem-code {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            border: 1px dashed rgba(255, 215, 0, 0.5);
        }
        .code-label {
            font-size: 11px;
            color: #8a94b5;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .code-value {
            font-size: 20px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 3px;
            color: #ffd700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }
        .code-note {
            font-size: 9px;
            color: #6a7396;
            margin-top: 8px;
        }
        .trust-badge {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .trust-badge span {
            font-size: 10px;
            color: #4a8c3f;
            background: rgba(74, 140, 63, 0.15);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .card-balance {
            font-weight: 800;
            font-size: 18px;
            color: #ffd700;
            margin: 10px 0;
        }
        .card-name {
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 12px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .add-cart {
            flex: 1;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #ffdfaa;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .buy-now {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            color: #0a0a1a;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .add-cart:active, .buy-now:active {
            transform: scale(0.96);
        }

        /* Scroll Indicator */
        .scroll-indicator {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: #8a94b5;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .scroll-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.3);
            transition: all 0.2s;
        }
        .dot.active {
            background: #ffd700;
            width: 20px;
            border-radius: 10px;
        }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0a19;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        @media (max-width: 500px) {
            .card-number { font-size: 18px; letter-spacing: 2px; }
            .card-type { font-size: 16px; }
            .card-price { font-size: 15px; }
            .toast-msg { font-size: 11px; white-space: normal; width: 85%; text-align: center; }
            .code-value { font-size: 14px; letter-spacing: 2px; }
            .trust-badge span { font-size: 8px; }
        }
    </style>
</head>
<body>

<!-- ========== BACKGROUND ========== -->
<div class="adventure-bg"></div>
<div class="mountain"></div>
<div class="mountain mountain-2"></div>
<div class="sun-glow"></div>
<div class="aurora"></div>

<!-- Moon -->
<div class="moon-container">
    <div class="moon-ring"></div>
    <div class="premium-moon">
        <div class="crater crater1"></div>
        <div class="crater crater2"></div>
        <div class="crater crater3"></div>
        <div class="crater crater4"></div>
        <div class="crater crater5"></div>
    </div>
</div>

<!-- Stars & Particles -->
<script>
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(star);
    }
    
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 4 + 1;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.bottom = '0%';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.animationDuration = Math.random() * 6 + 4 + 's';
        document.body.appendChild(particle);
    }
</script>

<!-- Main Container -->
<div class="container">
    <!-- Category Buttons -->
    <div class="category-buttons">
        <button class="cat-btn active" data-cat="master">💳 MASTER CARD</button>
        <button class="cat-btn" data-cat="playstore">🎮 PLAY STORE REDEEM CODE</button>
    </div>

    <!-- Scrollable Cards -->
    <div class="cards-scroll-container" id="scrollContainer">
        <div class="cards-wrapper" id="cardsWrapper">
            <!-- Cards will be dynamically added here -->
        </div>
    </div>
    
    <!-- Scroll Indicator -->
    <div class="scroll-indicator">
        <span>👆 Scroll to see more cards</span>
        <div class="scroll-dots" id="scrollDots"></div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // Master Cards Data
    const masterCards = [
        {
            id: 1,
            type: "MASTERCARD",
            number: "5412 7582 9314 XXXX",
            expiry: "12/28",
            cvv: "123",
            balance: 1200,
            price: 100,
            name: "ROHIT SHARMA",
            category: "master"
        },
        {
            id: 2,
            type: "MASTERCARD",
            number: "5034 2430 5309 XXXX",
            expiry: "11/27",
            cvv: "456",
            balance: 2450,
            price: 250,
            name: "JOHNSON CARDER",
            category: "master"
        },
        {
            id: 3,
            type: "MASTERCARD",
            number: "4532 7890 1234 XXXX",
            expiry: "09/28",
            cvv: "789",
            balance: 5000,
            price: 500,
            name: "SNEHA P.",
            category: "master"
        },
        {
            id: 4,
            type: "MASTERCARD",
            number: "3602 7135 8913 XXXX",
            expiry: "01/30",
            cvv: "321",
            balance: 10000,
            price: 1000,
            name: "DIVYA R.",
            category: "master"
        },
        {
            id: 5,
            type: "MASTERCARD",
            number: "5123 4567 8901 XXXX",
            expiry: "03/29",
            cvv: "654",
            balance: 20000,
            price: 1500,
            name: "KARTIK R.",
            category: "master"
        }
    ];

    // Play Store Redeem Codes Data
    const playstoreCards = [
        {
            id: 1,
            type: "PLAY STORE",
            redeemCode: "ABCD-EFGH-IJKL-MNOP",
            balance: 1200,
            price: 100,
            name: "GOOGLE PLAY GIFT",
            category: "playstore"
        },
        {
            id: 2,
            type: "PLAY STORE",
            redeemCode: "QRST-UVWX-YZ12-3456",
            balance: 2450,
            price: 250,
            name: "PLAY STORE CARD",
            category: "playstore"
        },
        {
            id: 3,
            type: "PLAY STORE",
            redeemCode: "7890-ABCD-EFGH-IJKL",
            balance: 5000,
            price: 500,
            name: "GOOGLE PLAY BALANCE",
            category: "playstore"
        },
        {
            id: 4,
            type: "PLAY STORE",
            redeemCode: "MNOP-QRST-UVWX-YZ12",
            balance: 10000,
            price: 1000,
            name: "PLAY STORE CREDITS",
            category: "playstore"
        },
        {
            id: 5,
            type: "PLAY STORE",
            redeemCode: "3456-7890-ABCD-EFGH",
            balance: 20000,
            price: 1500,
            name: "GOOGLE PLAY GIFT",
            category: "playstore"
        }
    ];

    let currentCategory = "master";
    let currentCards = masterCards;

    // DOM Elements
    const cardsWrapper = document.getElementById('cardsWrapper');
    const scrollContainer = document.getElementById('scrollContainer');
    const scrollDots = document.getElementById('scrollDots');
    const catBtns = document.querySelectorAll('.cat-btn');
    const toastMsg = document.getElementById('toastMsg');

    // Render Card HTML
    function renderCardHTML(card) {
        const isPlayStore = card.category === "playstore";
        
        if (isPlayStore) {
            return `
                <div class="card-container">
                    <div class="card-header">
                        <div class="card-type">🎮 ${card.type} REDEEM CODE</div>
                        <div class="card-price">₹${card.price}</div>
                    </div>
                    <div class="redeem-code">
                        <div class="code-label">🔑 YOUR REDEEM CODE</div>
                        <div class="code-value">${card.redeemCode}</div>
                        <div class="code-note">⚠️ Redeem on Google Play Store app</div>
                    </div>
                    <div class="card-balance">💎 REDEEM VALUE: ₹${card.balance.toLocaleString()}</div>
                    <div class="trust-badge">
                        <span>✅ Trusted Seller</span>
                        <span>⚡ Instant Delivery</span>
                        <span>🔒 Secure Code</span>
                    </div>
                    <div class="card-name">${card.name}</div>
                    <div class="action-buttons">
                        <div class="add-cart" onclick="addToCart(${card.id}, '${card.category}')">🛒 Add to Cart</div>
                        <div class="buy-now" onclick="buyNow(${card.id}, '${card.category}')">💎 Buy Now — ₹${card.price}</div>
                    </div>
                </div>
            `;
        } else {
            return `
                <div class="card-container">
                    <div class="card-header">
                        <div class="card-type">💳 ${card.type}</div>
                        <div class="card-price">₹${card.price}</div>
                    </div>
                    <div class="card-number">${card.number}</div>
                    <div class="card-details">
                        <span>EXPIRES <strong>${card.expiry}</strong></span>
                        <span>CVV <strong>${card.cvv}</strong></span>
                    </div>
                    <div class="card-balance">💰 BALANCE: ₹${card.balance.toLocaleString()}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="action-buttons">
                        <div class="add-cart" onclick="addToCart(${card.id}, '${card.category}')">🛒 Add to Cart</div>
                        <div class="buy-now" onclick="buyNow(${card.id}, '${card.category}')">💎 Buy Now — ₹${card.price}</div>
                    </div>
                </div>
            `;
        }
    }

    // Render All Cards
    function renderAllCards() {
        cardsWrapper.innerHTML = '';
        currentCards.forEach(card => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card-item';
            cardDiv.innerHTML = renderCardHTML(card);
            cardsWrapper.appendChild(cardDiv);
        });
        
        // Update scroll dots
        updateScrollDots();
    }

    // Update Scroll Dots
    function updateScrollDots() {
        const cardCount = currentCards.length;
        scrollDots.innerHTML = '';
        for (let i = 0; i < cardCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.setAttribute('data-index', i);
            scrollDots.appendChild(dot);
        }
        
        // Set active dot based on scroll position
        updateActiveDot();
    }

    // Update Active Dot on Scroll
    function updateActiveDot() {
        if (!scrollContainer) return;
        const scrollPosition = scrollContainer.scrollLeft;
        const cardWidth = scrollContainer.clientWidth;
        const activeIndex = Math.round(scrollPosition / cardWidth);
        
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === activeIndex) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    // Switch Category
    function switchCategory(category) {
        currentCategory = category;
        if (category === "master") {
            currentCards = masterCards;
        } else {
            currentCards = playstoreCards;
        }
        
        // Update active button style
        catBtns.forEach(btn => {
            if ((category === "master" && btn.dataset.cat === "master") ||
                (category === "playstore" && btn.dataset.cat === "playstore")) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        renderAllCards();
        
        // Scroll to start
        setTimeout(() => {
            if (scrollContainer) {
                scrollContainer.scrollLeft = 0;
                updateActiveDot();
            }
        }, 100);
    }

    // Add to Cart
    function addToCart(cardId, category) {
        const card = currentCards.find(c => c.id === cardId);
        showToast(`📦 Added to cart: ${card.type} - ₹${card.price}`);
    }
    
    // Buy Now - UPI Payment
    function buyNow(cardId, category) {
        const card = currentCards.find(c => c.id === cardId);
        showToast(`💎 Processing payment for ₹${card.price}... Opening UPI app`);
        
        const upiUrl = `upi://pay?pa=kartikrawat6266@okhdfcbank&pn=CARDVAULT&am=${card.price}&cu=INR&tn=Premium%20Card%20Purchase`;
        const anchor = document.createElement('a');
        anchor.href = upiUrl;
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        
        setTimeout(() => {
            if (category === "playstore") {
                showToast(`💰 Payment for ₹${card.price} successful! Redeem code: ${card.redeemCode} will be sent via email.`, 5000);
            } else {
                showToast(`💰 Payment request for ₹${card.price}. Open UPI app to complete!`, 4000);
            }
        }, 1000);
    }

    function showToast(msg, duration = 2500) {
        toastMsg.textContent = msg;
        toastMsg.style.display = 'block';
        setTimeout(() => {
            toastMsg.style.display = 'none';
        }, duration);
    }

    // Scroll Event Listener
    if (scrollContainer) {
        scrollContainer.addEventListener('scroll', updateActiveDot);
    }

    // Category Button Event Listeners
    catBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            switchCategory(btn.dataset.cat);
        });
    });

    // Initialize
    renderAllCards();
</script>
</body>
</html>
